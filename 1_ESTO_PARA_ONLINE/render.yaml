databases:
  - name: bombastic-db
    plan: free

services:
  - type: web
    name: bombastic-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bombastic-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
